name: Build and Deploy Astro

on:
  push:
    branches: [main, master, preview, develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Куда публиковать сборку'
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.deploy-meta.outputs.deploy_target }}
      deploy_kind: ${{ steps.deploy-meta.outputs.deploy_kind }}
    steps:
      - uses: actions/checkout@v4

      - id: deploy-meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TARGET: ${{ github.event.inputs.deploy_target }}
          PRODUCTION_DEPLOY_ENABLED_VAR: ${{ vars.PRODUCTION_DEPLOY_ENABLED }}
          SITE_URL_VAR: ${{ vars.SITE_URL }}
          TEST_SITE_URL_VAR: ${{ vars.TEST_SITE_URL }}
          BASE_PATH_VAR: ${{ vars.BASE_PATH }}
          TEST_BASE_PATH_VAR: ${{ vars.TEST_BASE_PATH }}
        run: |
          production_enabled="false"
          if [ "$PRODUCTION_DEPLOY_ENABLED_VAR" = "true" ]; then
            production_enabled="true"
          fi

          site_url_configured="false"
          if [ -n "$SITE_URL_VAR" ]; then
            site_url_configured="true"
          fi

          target="test"
          deploy_kind="check-only"
          deploy_reason="Defaulting to test build without deployment."

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            requested_target="${DISPATCH_TARGET:-test}"
            if [ "$requested_target" = "production" ]; then
              if [ "$production_enabled" = "true" ]; then
                target="production"
                deploy_kind="production"
                deploy_reason="workflow_dispatch requested production and PRODUCTION_DEPLOY_ENABLED=true."
              else
                target="test"
                deploy_kind="check-only"
                deploy_reason="workflow_dispatch requested production, but production deploy is disabled."
              fi
            else
              target="test"
              deploy_kind="test"
              deploy_reason="workflow_dispatch requested test."
            fi
          elif [ "${GITHUB_REF_NAME}" = "preview" ] || [ "${GITHUB_REF_NAME}" = "develop" ]; then
            target="test"
            deploy_kind="test"
            deploy_reason="preview/develop branches always use test deployment."
          elif [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            if [ "$production_enabled" = "true" ]; then
              target="production"
              deploy_kind="production"
              deploy_reason="main/master with PRODUCTION_DEPLOY_ENABLED=true."
            else
              target="test"
              deploy_kind="check-only"
              deploy_reason="main/master with production deploy disabled; running test build only."
            fi
          else
            target="test"
            deploy_kind="check-only"
            deploy_reason="Non-deploy branch; running test build only."
          fi

          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$target" = "production" ]; then
            base_path="${BASE_PATH_VAR:-/}"
            test_site_url="${TEST_SITE_URL_VAR:-https://${GITHUB_REPOSITORY_OWNER}.github.io}"
            effective_site_url="${SITE_URL_VAR}"
            effective_site_url_source="SITE_URL"
            production_check_ran="true"
          else
            if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
              fallback_base_path="/"
            else
              fallback_base_path="/${repo_name}"
            fi
            base_path="${TEST_BASE_PATH_VAR:-$fallback_base_path}"
            if [ -n "$TEST_SITE_URL_VAR" ]; then
              test_site_url="$TEST_SITE_URL_VAR"
              effective_site_url_source="TEST_SITE_URL"
            else
              test_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io"
              effective_site_url_source="GitHub Pages fallback"
            fi
            effective_site_url="${test_site_url}"
            production_check_ran="false"
          fi

          echo "deploy_target=${target}" >> "$GITHUB_OUTPUT"
          echo "deploy_kind=${deploy_kind}" >> "$GITHUB_OUTPUT"
          echo "base_path=${base_path}" >> "$GITHUB_OUTPUT"
          echo "test_site_url=${test_site_url}" >> "$GITHUB_OUTPUT"
          echo "effective_site_url=${effective_site_url}" >> "$GITHUB_OUTPUT"
          echo "effective_site_url_source=${effective_site_url_source}" >> "$GITHUB_OUTPUT"
          echo "production_check_ran=${production_check_ran}" >> "$GITHUB_OUTPUT"
          echo "production_enabled=${production_enabled}" >> "$GITHUB_OUTPUT"
          echo "site_url_configured=${site_url_configured}" >> "$GITHUB_OUTPUT"
          echo "deploy_reason=${deploy_reason}" >> "$GITHUB_OUTPUT"
          echo "EVENT_NAME=${EVENT_NAME}"
          echo "github.ref_name=${GITHUB_REF_NAME}"
          echo "PRODUCTION_DEPLOY_ENABLED=${production_enabled}"
          echo "detected DEPLOY_TARGET=${target}"
          echo "Deploy kind: ${deploy_kind}"
          echo "Base path: ${base_path}"
          echo "productionCheckRan=${production_check_ran}"
          echo "SITE_URL configured: ${site_url_configured}"
          echo "effective SITE_URL source: ${effective_site_url_source}"
          echo "Deploy decision: ${deploy_reason}"
          if [ "$production_enabled" != "true" ]; then
            echo "Production deploy is disabled. Set PRODUCTION_DEPLOY_ENABLED=true and SITE_URL to enable production deployment."
          fi
          {
            echo "### Deploy metadata"
            echo "- Event: ${EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF_NAME}"
            echo "- PRODUCTION_DEPLOY_ENABLED: ${production_enabled}"
            echo "- Detected DEPLOY_TARGET: ${target}"
            echo "- Deploy kind: ${deploy_kind}"
            echo "- SITE_URL configured: ${site_url_configured}"
            echo "- productionCheckRan: ${production_check_ran}"
            echo "- Effective SITE_URL source: ${effective_site_url_source}"
            echo "- Base path: ${base_path}"
            echo "- Decision: ${deploy_reason}"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Check production settings
        if: steps.deploy-meta.outputs.deploy_target == 'production'
        shell: bash
        env:
          PRODUCTION_DEPLOY_ENABLED: ${{ steps.deploy-meta.outputs.production_enabled }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          if [ "$PRODUCTION_DEPLOY_ENABLED" != "true" ]; then
            echo "::error::Production deploy is disabled. Set PRODUCTION_DEPLOY_ENABLED=true and SITE_URL to enable production deployment."
            exit 1
          fi
          if [ -z "$SITE_URL" ]; then
            echo "::error::Production deploy requires SITE_URL. Set repository variable SITE_URL after the production domain and hosting are ready."
            exit 1
          fi

      - run: npm run check
        env:
          DEPLOY_TARGET: ${{ steps.deploy-meta.outputs.deploy_target }}
          PRODUCTION_DEPLOY_ENABLED: ${{ steps.deploy-meta.outputs.production_enabled }}
          SITE_URL: ${{ steps.deploy-meta.outputs.effective_site_url }}
          TEST_SITE_URL: ${{ steps.deploy-meta.outputs.test_site_url }}
          BASE_PATH: ${{ steps.deploy-meta.outputs.base_path }}
          ALLOW_TEMPORARY_SITE_URL: ${{ vars.ALLOW_TEMPORARY_SITE_URL || 'false' }}

      - run: npm run build
        env:
          DEPLOY_TARGET: ${{ steps.deploy-meta.outputs.deploy_target }}
          PRODUCTION_DEPLOY_ENABLED: ${{ steps.deploy-meta.outputs.production_enabled }}
          SITE_URL: ${{ steps.deploy-meta.outputs.effective_site_url }}
          TEST_SITE_URL: ${{ steps.deploy-meta.outputs.test_site_url }}
          BASE_PATH: ${{ steps.deploy-meta.outputs.base_path }}
          ALLOW_TEMPORARY_SITE_URL: ${{ vars.ALLOW_TEMPORARY_SITE_URL || 'false' }}

      - uses: actions/upload-pages-artifact@v3
        if: steps.deploy-meta.outputs.deploy_kind == 'test'
        with:
          path: dist

  deploy-test:
    if: needs.build.outputs.deploy_kind == 'test'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
