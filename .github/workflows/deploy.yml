name: Build and Deploy Astro

on:
  push:
    branches: [main, master, preview, develop]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Куда публиковать сборку'
        required: true
        default: test
        type: choice
        options:
          - test
          - production

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.deploy-meta.outputs.deploy_target }}
    steps:
      - uses: actions/checkout@v4

      - id: deploy-meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TARGET: ${{ github.event.inputs.deploy_target }}
          SITE_URL_VAR: ${{ vars.SITE_URL }}
          TEST_SITE_URL_VAR: ${{ vars.TEST_SITE_URL }}
          BASE_PATH_VAR: ${{ vars.BASE_PATH }}
          TEST_BASE_PATH_VAR: ${{ vars.TEST_BASE_PATH }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            target="${DISPATCH_TARGET:-test}"
          elif [ "${GITHUB_REF_NAME}" = "preview" ] || [ "${GITHUB_REF_NAME}" = "develop" ]; then
            target="test"
          elif [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            target="production"
          else
            target="test"
          fi

          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$target" = "production" ]; then
            base_path="${BASE_PATH_VAR:-/}"
            test_site_url="${TEST_SITE_URL_VAR:-https://${GITHUB_REPOSITORY_OWNER}.github.io}"
            effective_site_url="${SITE_URL_VAR}"
            effective_site_url_source="SITE_URL"
            production_check_ran="yes"
          else
            if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
              fallback_base_path="/"
            else
              fallback_base_path="/${repo_name}"
            fi
            base_path="${TEST_BASE_PATH_VAR:-$fallback_base_path}"
            if [ -n "$TEST_SITE_URL_VAR" ]; then
              test_site_url="$TEST_SITE_URL_VAR"
              effective_site_url_source="TEST_SITE_URL"
            else
              test_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io"
              effective_site_url_source="github-pages-fallback"
            fi
            effective_site_url="${test_site_url}"
            production_check_ran="no"
          fi

          echo "deploy_target=${target}" >> "$GITHUB_OUTPUT"
          echo "base_path=${base_path}" >> "$GITHUB_OUTPUT"
          echo "test_site_url=${test_site_url}" >> "$GITHUB_OUTPUT"
          echo "effective_site_url=${effective_site_url}" >> "$GITHUB_OUTPUT"
          echo "effective_site_url_source=${effective_site_url_source}" >> "$GITHUB_OUTPUT"
          echo "production_check_ran=${production_check_ran}" >> "$GITHUB_OUTPUT"
          echo "GitHub event: ${EVENT_NAME}"
          echo "GitHub ref: ${GITHUB_REF_NAME}"
          echo "Deploy target: ${target}"
          echo "Base path: ${base_path}"
          echo "Production check ran: ${production_check_ran}"
          echo "Effective SITE_URL source: ${effective_site_url_source}"
          {
            echo "### Deploy metadata"
            echo "- Event: ${EVENT_NAME}"
            echo "- Ref: ${GITHUB_REF_NAME}"
            echo "- Deploy target: ${target}"
            echo "- Production check ran: ${production_check_ran}"
            echo "- Effective SITE_URL source: ${effective_site_url_source}"
            echo "- Base path: ${base_path}"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Check production settings
        if: steps.deploy-meta.outputs.deploy_target == 'production'
        shell: bash
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "::error::Боевой домен пока не настроен. Задайте repository variable SITE_URL или используйте тестовую публикацию."
            exit 1
          fi

      - run: npm run check
        env:
          DEPLOY_TARGET: ${{ steps.deploy-meta.outputs.deploy_target }}
          SITE_URL: ${{ steps.deploy-meta.outputs.effective_site_url }}
          TEST_SITE_URL: ${{ steps.deploy-meta.outputs.test_site_url }}
          BASE_PATH: ${{ steps.deploy-meta.outputs.base_path }}
          ALLOW_TEMPORARY_SITE_URL: ${{ vars.ALLOW_TEMPORARY_SITE_URL || 'false' }}

      - run: npm run build
        env:
          DEPLOY_TARGET: ${{ steps.deploy-meta.outputs.deploy_target }}
          SITE_URL: ${{ steps.deploy-meta.outputs.effective_site_url }}
          TEST_SITE_URL: ${{ steps.deploy-meta.outputs.test_site_url }}
          BASE_PATH: ${{ steps.deploy-meta.outputs.base_path }}
          ALLOW_TEMPORARY_SITE_URL: ${{ vars.ALLOW_TEMPORARY_SITE_URL || 'false' }}

      - uses: actions/upload-pages-artifact@v3
        if: steps.deploy-meta.outputs.deploy_target == 'test'
        with:
          path: dist

  deploy-test:
    if: needs.build.outputs.deploy_target == 'test'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
